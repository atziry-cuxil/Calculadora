<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./index.css">
    <title>Calculadora</title>
</head>

<body>
    <div class="padre">
        <div class="resultado">
            <input id="pantalla" type="text" readonly class="w-100 h-100">
        </div>
        <div class="grid">
            <button id="borrar" class="btn m-1 border-black bg-danger text-white">X</button>
            <button id="2" class="btn p-2 m-1 border-black">(</button>
            <button id="3" class="btn p-2 m-1 border-black">)</button>
            <button id="4" class="btn p-2 m-1 border-black">mod</button>
            <button id="5" class="btn p-2 m-1 border-black">n</button>

            <button id="6" class="numero btn p-2 m-1 border-black">7</button>
            <button id="7" class="numero btn p-2 m-1 border-black">8</button>
            <button id="8" class="numero btn p-2 m-1 border-black">9</button>
            <button id="9" class="operador btn p-2 m-1 border-black">/</button>
            <button id="10" class="btn p-2 m-1 border-black"> √ </button>

            <button id="11" class="numero btn p-2 m-1 border-black">4</button>
            <button id="12" class="numero btn p-2 m-1 border-black">5</button>
            <button id="13" class="numero btn p-2 m-1 border-black">6</button>
            <button id="14" class="operador btn p-2 m-1 border-black">*</button>
            <button id="15" class="btn p-2 m-1 border-black">*2</button>

            <button id="16" class="numero btn p-2 m-1 border-black">1</button>
            <button id="17" class="numero btn p-2 m-1 border-black">2</button>
            <button id="18" class="numero btn p-2 m-1 border-black">3</button>
            <button id="19" class="operador btn p-2 m-1 border-black">-</button>
            <button id="igual" class="operador btn p-2 m-1 border-black bg-success nuevo">=</button>

            <button id="21" class="numero btn p-2 m-1 border-black">0</button>
            <button id="22" class="numero btn p-2 m-1 border-black">.</button>
            <button id="23" class="operador btn p-2 m-1 border-black">%</button>
            <button id="24" class="operador btn p-2 m-1 border-black">+</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/index.js"></script>
</body>

</html>
